            // 고대 정문 영역 가상 표시 (심볼용 호랑이 마크 반경)
            L.circle(koreaUnivCenter, { color: '#861f41', fillColor: '#861f41', fillOpacity: 0.1, radius: 100 })
                .addTo(map).bindPopup("🐯 고려대학교 안암캠퍼스 메인 카공 빌리지");

            // 브라우저 실시간 GPS 연동 시도
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const userLat = position.coords.latitude;
                        const userLng = position.coords.longitude;
                        
                        map.setView([userLat, userLng], 16);
                        
                        L.circle([userLat, userLng], {
                            color: '#0076ff',
                            fillColor: '#0076ff',
                            fillOpacity: 0.2,
                            radius: 50
                        }).addTo(map).bindPopup("📍 현재 내 실시간 위치").openPopup();
                    },
                    () => {
                        console.log("위치 권한 거부: 고대 안암역 기본 좌표로 고정 렌더링합니다.");
                    }
                );
            }

            renderMarkers();
        }

        // 2번 기능: 대량 데이터 필터링 마커 렌더링 로직
        function renderMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            cafeData.forEach(cafe => {
                if (currentFilter === 'all' || cafe.type.includes(currentFilter)) {
                    // 고대 시그니처 마커 색상 처리를 위해 기본 마커 생성
                    const marker = L.marker([cafe.lat, cafe.lng]).addTo(map);
                    marker.on('click', () => showCafeDetail(cafe));
                    markers.push(marker);
                }
            });
        }

        function toggleFilter(filterType, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = filterType;
            renderMarkers();
            closeModal();
        }

        // 3번 기능: 고대생 맞춤형 디테일 데이터 바인딩 및 모달 활성화
        function showCafeDetail(cafe) {
            document.getElementById('modal-title').innerText = cafe.name;
            document.getElementById('modal-tip').innerHTML = `<i class="fa-solid fa-plug"></i> <strong>콘센트 인프라:</strong> ${cafe.tip}`;
            document.getElementById('modal-time').innerHTML = `<i class="fa-solid fa-person-walking"></i> <strong>캠퍼스 기준 거리:</strong> ${cafe.time}`;
            document.getElementById('modal-review').innerHTML = `<i class="fa-solid fa-pen-to-square"></i> <strong>고대생 리얼 후기:</strong> ${cafe.review}`;

            const tagsContainer = document.getElementById('modal-tags');
            tagsContainer.innerHTML = '';
            cafe.type.forEach(t => {
                const tagSpan = document.createElement('span');
                tagSpan.className = 'tag';
                tagSpan.innerText = t === 'plug' ? '#🔌콘센트_풍부' : t === 'quiet' ? '#🤫조용한_학습' : '#⏰24시/심야스터디';
                tagsContainer.appendChild(tagSpan);
            });

            document.getElementById('cafe-modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('cafe-modal').classList.remove('active');
        }

        window.onload = initMap;
    </script>
</body>
</html>
